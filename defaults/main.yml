# Default path to signing key location
hth_sublime_repository_signing_directory_path: "/etc/apt/keyrings"

# Default name of the signing key file.
hth_sublime_repository_signing_key_filename: "packages.sublime.org.asc"

# Default path to apt preference file location
hth_sublime_apt_preference_path: "/etc/apt/preferences.d/sublime"

# Default repository url
hth_sublime_apt_repository_url: "https://download.sublimetext.com/"

# Default path for user configs. This path will be used in relation to the
# user's home directory.
hth_sublime_user_config_path: ".config/sublime-text/Packages/User/"

# Default file name for a user's preference file.
hth_sublime_user_preference_filename: "Preferences.sublime-settings"

# Default file name for a user's keymap file.
hth_sublime_user_keymap_filename: "Default (Linux).sublime-keymap"
